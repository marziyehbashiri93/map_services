services:

  # ── Step 1: Build base.mbtiles from iran.osm.pbf using Planetiler ─────────
  osm-build:
    image: ghcr.io/onthegomap/planetiler:latest
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx6g"
    volumes:
      - ./osm/profile.yml:/data/profile.yml:ro
      - ./data/iran.osm.pbf:/data/iran.osm.pbf:ro
      - ./data:/output
    command:
      - generate-custom
      - --schema=/data/profile.yml
      - --output=/output/base.mbtiles
      - --maxzoom=15
      - --force

  # ── Step 2: Build custom.mbtiles from PostGIS via Tippecanoe ──────────────
  #   Layers are auto-discovered from PostGIS; attributes are pruned against
  #   the rendered style (see custom/build.py + custom/config.yml).
  custom-build:
    build:
      context: ./custom
    volumes:
      - ./custom/config.yml:/app/config.yml:ro
      - ../map_assets/styles/base/style/day_1_admin_light.json:/style.json:ro
      - ./custom/data:/data
      - ./data:/output
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-viuna_map}
      DB_USER: ${DB_USER:-marziyeh}
      DB_PASS: ${DB_PASS:-}
      SCHEMA: ${SCHEMA:-public}
      FORCE: ${FORCE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Step 3: Martin tile server (serves local mbtiles files) ──────────────
  martin:
    image: maplibre/martin:latest
    container_name: martin
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data:ro
      - ./martin/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    restart: unless-stopped
    networks:
      - map_services_net

networks:
  map_services_net:
    external: true
