services:

  # ── Step 1: Build osm.mbtiles from iran.osm.pbf using Planetiler ──────────
  osm-build:
    image: ghcr.io/onthegomap/planetiler:latest
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx6g"
    volumes:
      - ./osm/profile.yml:/data/profile.yml:ro
      - ./data/iran.osm.pbf:/data/iran.osm.pbf:ro
      - ./data:/output
    command:
      - generate-custom
      - --schema=/data/profile.yml
      - --output=/output/osm.mbtiles
      - --maxzoom=14
      - --force

  # ── Step 2: Build custom.mbtiles from GeoJSON / PostGIS via Tippecanoe ────
  custom-build:
    build:
      context: ./custom
    volumes:
      - ./custom/data:/data
      - ./data:/output
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-osm}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-bashiri-2020}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Step 3: Martin tile server (serves local mbtiles files) ──────────────
  martin:
    image: maplibre/martin:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data:ro
      - ./martin/config.yaml:/config.yaml:ro
    command: ["--config", "/config.yaml"]
    restart: unless-stopped
