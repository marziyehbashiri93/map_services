services:
  graphhopper:
    build: .
    image: graphhopper:latest
    container_name: graphhopper

    ports:
      # S-H1: Both ports bound to loopback — API is proxied by Nginx; admin is internal only.
      - "0.0.0.0:8989:8989"   # Routing API  (proxied via /graphhopper/ in map_gateway)
      - "127.0.0.1:8990:8990"   # Admin API    (metrics, thread dumps — loopback only)

    networks:
      - map_services_net
      - fleet-net

    init: true

    environment:
      # P-G1: -Xmx5500m leaves ~500 MB headroom within the 6 G container limit
      #        for JVM non-heap (metaspace, code cache) + OS overhead.
      - JAVA_OPTS=-Xms512m -Xmx5500m

    # Bind mounts: Docker creates missing host paths as empty dirs (often root-owned); chown if needed.
    volumes:
      - ./data:/data
      - ./data/logs:/graphhopper/logs
      - ./config-example.yml:/graphhopper/config-example.yml
      - ./graphhopper.sh:/graphhopper/graphhopper.sh

    entrypoint: ["/bin/bash"]
    command: ["./graphhopper.sh"]

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 6G        # P-G1: raised from 5 G — gives JVM heap (5.5 G) proper headroom
        reservations:
          cpus: "0.5"
          memory: 1G

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --max-time 5 -o /dev/null http://localhost:8989/health || exit 1",
        ]
      interval: 2m
      retries: 3
      timeout: 10s
      start_period: 30m   # ST-3: Iran PBF graph build can take 15-30 min on first start

    # S-M4: Log rotation
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

    restart: unless-stopped

networks:
  map_services_net:
    external: true
    name: map_services_net
  fleet-net:
    external: true
    name: fleet-net
