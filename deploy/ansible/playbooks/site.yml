---
# Deploy map_services stacks on target host(s) using Docker Compose.
# Prerequisites on the control node: Ansible 2.12+ recommended.
# Prerequisites on the target: Docker Engine + docker compose plugin, Python 3 (for script + Ansible).
#
# Sync/copy the repository yourself first, or add tasks (e.g. ansible.builtin.synchronize, git)
# before the role. This play assumes map_services_deploy_root already contains a checkout.
#
# Example:
#   cd deploy/ansible
#   ansible-galaxy collection install community.docker  # not required; play uses docker compose CLI
#   cp inventory/hosts.example.yml inventory/hosts.yml
#   # edit inventory/hosts.yml — set ansible_host, ansible_user, ansible_port
#   cp group_vars/all/example.yml group_vars/all/vars.yml
#   # edit vars — at minimum map_services_deploy_root
#   ansible-playbook playbooks/site.yml -i inventory/hosts.yml
#
# Extra vars:
#   ansible-playbook playbooks/site.yml -i inventory/hosts.yml -e "map_services_deploy_root=/opt/map_services"
#   ansible-playbook playbooks/site.yml -i inventory/hosts.yml -e "map_services_start_graphhopper=true"
#
# Secrets (DB passwords, TLS keys, Mapbox tokens) do not belong in this play; keep them in Vault,
# a secrets manager, or host files outside git — see deploy/ansible/README.md.

- name: Map services — Docker Compose deployment
  hosts: map_services
  gather_facts: false
  roles:
    - map_services
