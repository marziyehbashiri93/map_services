- name: Check repository root exists on target
  ansible.builtin.stat:
    path: "{{ map_services_deploy_root }}"
  register: _repo_root

- name: Fail if map_services path is missing
  ansible.builtin.fail:
    msg: "Deploy root {{ map_services_deploy_root }} not found. Clone or rsync the repo there, or set map_services_deploy_root."
  when: not _repo_root.stat.exists

# Idempotent: `docker network create` fails with "already exists" (non-zero) — not a play failure.
- name: Ensure external Docker network exists
  ansible.builtin.command:
    cmd: docker network create {{ item }}
  register: _net
  failed_when: _net.rc != 0 and ('already exists' not in _net.stderr | default('') and 'already in use' not in _net.stderr | default(''))
  changed_when: _net.rc == 0
  loop: "{{ [map_services_net_name] + ([map_services_fleet_net_name] if map_services_ensure_fleet_net | bool else []) }}"

- name: Publish hybrid assets for Nginx (styles / sprite / fonts)
  ansible.builtin.command:
    cmd: "{{ map_services_python3 }} scripts/publish_hybrid_assets.py"
    chdir: "{{ map_services_deploy_root }}/tileserver"
  when: map_services_run_publish_hybrid_assets | bool

# Shell keeps `up -d` and optional `--build` in one line without spurious empty argv.
- name: Docker Compose up (tileserver)
  ansible.builtin.shell: docker compose up -d{% if map_services_compose_build | bool %} --build{% endif %}
  args:
    chdir: "{{ map_services_deploy_root }}/tileserver"
    executable: /bin/bash
  when: map_services_start_tileserver | bool

- name: Docker Compose up (map_gateway)
  ansible.builtin.shell: docker compose up -d{% if map_services_compose_build | bool %} --build{% endif %}
  args:
    chdir: "{{ map_services_deploy_root }}/map_gateway"
    executable: /bin/bash
  when: map_services_start_map_gateway | bool

- name: Docker Compose up (geoserver)
  ansible.builtin.shell: docker compose up -d{% if map_services_compose_build | bool %} --build{% endif %}
  args:
    chdir: "{{ map_services_deploy_root }}/geoserver"
    executable: /bin/bash
  when: map_services_start_geoserver | bool

- name: Docker Compose up (graphhopper)
  ansible.builtin.shell: docker compose up -d{% if map_services_compose_build | bool %} --build{% endif %}
  args:
    chdir: "{{ map_services_deploy_root }}/graphhopper"
    executable: /bin/bash
  when: map_services_start_graphhopper | bool

- name: Wait for gateway HTTP
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ map_services_gateway_http_port }}"
    timeout: 120
  when: map_services_run_health_checks | bool and map_services_start_map_gateway | bool

- name: GET gateway healthz
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ map_services_gateway_http_port }}/healthz"
    return_content: true
  when: map_services_run_health_checks | bool and map_services_start_map_gateway | bool
  register: _healthz
  failed_when: _healthz.status != 200 or 'ok' not in _healthz.content

- name: "GET hybrid style (expect 200; style: {{ map_services_healthcheck_style }})"
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ map_services_gateway_http_port }}/styles/v1/{{ map_services_healthcheck_style }}.json"
    method: GET
  when: map_services_run_health_checks | bool and map_services_start_map_gateway | bool
  register: _style
  failed_when: _style.status != 200

- name: GET TileServer root (direct)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ map_services_tileserver_port }}/"
  when: map_services_run_health_checks | bool and map_services_start_tileserver | bool
  register: _ts
  failed_when: _ts.status not in [200, 301, 302, 404]
