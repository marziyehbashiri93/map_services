# Copy to hosts.yml (or use -i) and set your real values. Do not commit real hostnames
# with secrets; use vault or a private inventory.
#
# Group: map_services — hosts that run the Docker-based map stack.
#
# Per-host / connection (standard Ansible):
#   ansible_host     — IP or DNS of the target (required if not same as inventory name)
#   ansible_user     — SSH user for deployment
#   ansible_port     — SSH port (default 22)
#   ansible_python_interpreter — e.g. /usr/bin/python3 if auto-detection fails
#
# You can set connection vars here or in group_vars (see group_vars/all/example.yml).
#
# Example: single server
all:
  children:
    map_services:
      hosts:
        map-prod-01:
          # Set ansible_host to the server IP or DNS name (or pass -e ansible_host=... for ad-hoc).
          # ansible_host: 203.0.113.50
          # ansible_user: deploy
          # ansible_port: 22
