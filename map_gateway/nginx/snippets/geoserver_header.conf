proxy_http_version 1.1;

# تنظیمات اصلی Forward
proxy_set_header Host $host:10580;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Port 10580;
proxy_set_header X-Forwarded-Host $host:10580;
proxy_set_header X-Forwarded-Server $host;
proxy_set_header X-Forwarded-Uri $request_uri;

# رفع مشکل حذف شدن پورت در ریدایرکت‌های خودکار Tomcat/GeoServer
proxy_redirect http://$host/geoserver/ http://$host:10580/geoserver/;

# حذف هدر CSP پیش‌فرض ژئوسرور تا تداخل ایجاد نکند
proxy_hide_header Content-Security-Policy;

# اعمال هدر CSP جدید به‌صورت تک‌خطی (برای جلوگیری از خطاهای پارسینگ مرورگرها)
add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; font-src 'self' data:; form-action 'self' http://$host:10580;" always;

