# Upstreams for the map gateway. Adjust host:port for bare-metal installs.
#
# Docker (default): service names resolve on the compose network.
# Bare metal: e.g. server 127.0.0.1:9090; for TileServer, 127.0.0.1:8989 for GraphHopper.
#
# Optional second TileServer (e.g. legacy /tileserver/ path): define tileserver_alt_upstream
# and uncomment the location block in 10-gateway-http.conf.

upstream tileserver_upstream {
    server tileserver:8080;
    keepalive 32;
}

upstream geoserver_upstream {
    server geoserver:8080;
    keepalive 16;
}

upstream graphhopper_upstream {
    server graphhopper:8989;
    keepalive 16;
}

