# Upstreams for the map gateway. Adjust host:port for bare-metal installs.
#
# Docker (default): service names resolve on the compose network.
# Bare metal: e.g. server 127.0.0.1:3000 for Martin, 127.0.0.1:8989 for GraphHopper.

upstream tile_backend_upstream {
    server martin:3000;
    keepalive 32;
}

upstream geoserver_upstream {
    server geoserver:8080;
    keepalive 16;
}

upstream graphhopper_upstream {
    server graphhopper:8989;
    keepalive 16;
}

upstream fleettrack_upstream {
    server fleet_tracker-api-1:8000;
    keepalive 16;
}
