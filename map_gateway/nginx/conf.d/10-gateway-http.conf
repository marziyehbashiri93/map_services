# HTTP gateway: static styles/sprite/fonts on Nginx; tile backend on / (one catch-all, same upstream for /data/, /tiles/, ...).
# GeoServer + GraphHopper: reverse proxy on /geoserver/ and /graphhopper/ (same Docker network).
# Bare metal: set server addresses in 00-upstreams.conf (127.0.0.1:…).
# SSL: see nginx/conf.d/map.ssl.conf.example when the certificate is ready.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- Static map assets (style_convertor.py -> map_gateway/data/map_assets/...) ---
    # On bare metal, point alias to e.g. /srv/map_assets/styles/ instead of /opt/map_assets/styles/.
    location /styles/ {
        alias /opt/map_assets/styles/;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
        include /etc/nginx/snippets/cors_header.conf;

    }

    location /sprite/ {
        alias /opt/map_assets/sprite/;
        include /etc/nginx/snippets/cache-static.conf;
        try_files $uri =404;
        include /etc/nginx/snippets/cors_header.conf;

    }

    location /fonts/ {
        alias /opt/map_fonts/;
        include /etc/nginx/snippets/cache-static.conf;
        try_files $uri =404;
        include /etc/nginx/snippets/cors_header.conf;

    }
    location /terrain_tiles/ {
        alias /opt/terrain_tiles/;
        include /etc/nginx/snippets/cache-static.conf;
        include /etc/nginx/snippets/cors_header.conf;
        try_files $uri =404;


    }

    location /geoserver/ {
        proxy_pass http://geoserver_upstream/geoserver/;
        include /etc/nginx/snippets/geoserver_header.conf;
    }

    location /graphhopper/ {
        rewrite ^/graphhopper(/.*)$ $1 break;
        proxy_pass http://graphhopper_upstream;
        include /etc/nginx/snippets/proxy-tile-backend.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location /fleettrack/ {
        proxy_pass http://fleettrack_upstream;
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        include /etc/nginx/snippets/cors_header.conf;
        }

    # Tile backend: everything not matched above (Martin catalog, TileJSON, vector tiles, ...).
    location / {
        proxy_pass http://tile_backend_upstream/;
        include /etc/nginx/snippets/proxy-tile-backend.conf;
    }
}
