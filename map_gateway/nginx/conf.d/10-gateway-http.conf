# HTTP gateway: static styles/sprite/fonts on Nginx; TileServer on / (one catch-all, same upstream for /data/, /tiles/, …).
# GeoServer + GraphHopper: reverse proxy on /geoserver/ and /graphhopper/ (same Docker network).
# Bare metal: set server addresses in 00-upstreams.conf (127.0.0.1:…).
# SSL: see nginx/conf.d/map.ssl.conf.example when the certificate is ready.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    include /etc/nginx/snippets/security-headers.conf;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- Hybrid static (publish_hybrid_assets.py → map_gateway/data/tileserver/...) ---
    # On bare metal, point alias to e.g. /srv/map_assets/styles/ instead of /opt/map_assets/styles/.
    location /styles/ {
        alias /opt/map_assets/styles/;
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }

    location /sprite/ {
        alias /opt/map_assets/sprite/;
        include /etc/nginx/snippets/cache-static.conf;
        try_files $uri =404;
    }

    location /fonts/ {
        alias /opt/map_fonts/;
        include /etc/nginx/snippets/cache-static.conf;
        try_files $uri =404;
    }

    location /geoserver/ {
        proxy_pass http://geoserver_upstream/geoserver/;
        include /etc/nginx/snippets/proxy-tileserver.conf;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /graphhopper/ {
        rewrite ^/graphhopper(/.*)$ $1 break;
        proxy_pass http://graphhopper_upstream;
        include /etc/nginx/snippets/proxy-tileserver.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Optional: second TileServer under /tileserver/ (uncomment upstream + block when needed).
    # location /tileserver/ {
    #     proxy_pass http://tileserver_alt_upstream/;
    #     include /etc/nginx/snippets/proxy-tileserver.conf;
    # }

    # TileServer: everything not matched above (/, /data/, /tiles/, /styles.json, …).
    location / {
        proxy_pass http://tileserver_upstream/;
        include /etc/nginx/snippets/proxy-tileserver.conf;
    }
}
