# Map HTTP gateway (Nginx). All volume paths are relative to this folder.
#
# Bring-up (after TileServer network exists):
#   cd ../tileserver && docker compose up -d
#   cd ../map_gateway && docker compose up -d --build
#
# First time: docker network create map_services_net
# Or always start tileserver compose first (it creates the network).

services:
  nginx:
    build: .
    image: map_gateway_nginx:local
    container_name: map_nginx
    ports:
      - "80:80"
    volumes:
      - ./data/tileserver/styles:/opt/map_assets/styles:ro
      - ./data/tileserver/sprite:/opt/map_assets/sprite:ro
      - ./data/tileserver/fonts:/opt/map_fonts:ro
      - ./data/tileserver/terrain_tiles:/opt/terrain_tiles:ro
    restart: unless-stopped
    networks:
      - map_services_net

networks:
  map_services_net:
    external: true
