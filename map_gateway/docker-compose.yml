# Map HTTP gateway (Nginx). All volume paths are relative to this folder.
#
# Bring-up (after map_services_net exists):
#   docker network create map_services_net
#   cd ../map_gateway && docker compose up -d --build
#
# First time: docker network create map_services_net

services:
  nginx:
    build: .
    image: map_gateway_nginx:local
    container_name: map_nginx
    ports:
      - "80:80"
    volumes:
      - ./data/map_assets/styles:/opt/map_assets/styles:ro
      - ./data/map_assets/sprite:/opt/map_assets/sprite:ro
      - ./data/map_assets/fonts:/opt/map_fonts:ro
      - ./data/map_assets/terrain_tiles:/opt/terrain_tiles:ro
    restart: unless-stopped
    networks:
      - map_services_net

networks:
  map_services_net:
    external: true
