services:
  geoserver:
    build: .
    container_name: geoserver
    ports:
      - "8090:8080"
    networks:
      - map_services_net
      - fleet-net
    init: true
    environment:
      - INSTALL_EXTENSIONS=true
      - STABLE_EXTENSIONS=oracle,vectortiles
      - EXTRA_JAVA_OPTS=-Xms256m -Xmx1024m -XX:SoftRefLRUPolicyMSPerMB=36000
      # این متغیر آدرس دقیق و نهایی ژئوسرور با پورت صحیح را مشخص می‌کند
      - PROXY_BASE_URL=http://5.201.178.229:10580/geoserver
      # در برخی ایمیج‌های ژئوسرور برای خواندن هدرهای Nginx نیاز است
      - USE_FORWARDED_HEADERS=true
      - GEOSERVER_CSRF_WHITELIST=5.201.178.229:10580,5.201.178.229
      # S-M1: CORS is enabled but currently unrestricted.
      # TODO: Once your domain is known, replace these two lines with:
      #   - CORS_ENABLED=true
      #   - CORS_ALLOWED_ORIGINS=https://your-domain.com
      - CORS_ENABLED=false
    # Bind mounts: Docker creates missing host directories as empty folders (often root-owned).
    volumes:
      - ./data/geoserver_data:/opt/geoserver_data/:Z
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --max-time 5 -o /dev/null http://localhost:8080/geoserver/rest/about/version || exit 1",
        ]
      interval: 2m
      retries: 3
      timeout: 10s
      start_period: 120s
    # S-M4: Log rotation
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    restart: unless-stopped

networks:
  map_services_net:
    external: true
    name: map_services_net
  fleet-net:
    external: true
    name: fleet-net
