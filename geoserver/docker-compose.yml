services:
  geoserver:
    container_name: geoserver
    build:
      context: .
      args:
        GEOSERVER_VERSION: "2.28.3"
    ports:
      - "8090:8080"
    networks:
      - map_services_net
      - fleet-net
    init: true
    environment:
      - INSTALL_EXTENSIONS=true
      - STABLE_EXTENSIONS=oracle,vectortiles
      - EXTRA_JAVA_OPTS=-Xms256m -Xmx1024m -XX:SoftRefLRUPolicyMSPerMB=36000
      - CORS_ENABLED=true
    # Bind mounts: Docker creates missing host directories as empty folders (often root-owned); adjust ownership if the container user needs write access. tomcat/conf still needs your context.xml (etc.).
    volumes:
      - ./data/geoserver_data:/opt/geoserver_data/:Z
      - ./data/additional_libs:/opt/additional_libs:Z
      - ./data/tomcat/conf:/opt/apache-tomcat-9.0.89/conf:Z
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS --max-time 5 -o /dev/null http://localhost:8080/geoserver/rest/about/version || exit 1",
        ]
      interval: 2m
      retries: 3
      timeout: 10s
      start_period: 120s
    restart: unless-stopped

networks:
  map_services_net:
    external: true
    name: map_services_net
  fleet-net:
    external: true
    name: fleet-net
