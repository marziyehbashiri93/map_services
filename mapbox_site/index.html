<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Map Style Tester</title>
    <link rel="stylesheet" href="./vendor/maplibre-gl.css">
    <style>
        :root { font-family: sans-serif; }
        body { margin: 0; }
        #toolbar {
            display: grid;
            grid-template-columns: repeat(3, minmax(160px, 1fr));
            gap: 8px;
            align-items: end;
            padding: 10px;
            border-bottom: 1px solid #ddd;
            background: #fff;
        }
        label { display: block; font-size: 12px; margin-bottom: 4px; }
        input, select, button { width: 100%; box-sizing: border-box; padding: 6px 8px; font-size: 14px; }
        #status { grid-column: 1 / -1; font-size: 12px; color: #333; }
        #status.error { color: #b42323; }
        #map { width: 100%; height: calc(100vh - 118px); }
    </style>
</head>
<body>
<div id="toolbar">
    <div>
        <label for="baseUrl">Base URL</label>
        <input id="baseUrl" type="text">
    </div>
    <div>
        <label for="styleName">Style name</label>
        <select id="styleName"></select>
    </div>
    <div>
        <button id="applyBtn" type="button">Load / Reload</button>
    </div>
    <div id="status">در حال آماده‌سازی نقشه...</div>
</div>

<div id="map"></div>

<script src="./vendor/maplibre-gl.js"></script>
<script>
    const config = {
        baseUrl: "http://127.0.0.1:80",
        styleName: "base_style_admin",
        center: [51.393428, 35.726271],
        zoom: 5
    };

    const controls = {
        baseUrl: document.getElementById("baseUrl"),
        styleName: document.getElementById("styleName"),
        applyBtn: document.getElementById("applyBtn"),
        status: document.getElementById("status")
    };

    function setStatus(message, isError) {
        controls.status.textContent = message;
        controls.status.className = isError ? "error" : "";
    }

    function normalizeBaseUrl(url) {
        return url.trim().replace(/\/+$/, "");
    }

    function vectorStyleUrl() {
        return normalizeBaseUrl(config.baseUrl) + "/styles/v1/" + config.styleName + ".json";
    }

    function stylesEndpointUrl() {
        return normalizeBaseUrl(config.baseUrl) + "/styles/v1/styles.json";
    }

    function extractStyleNames(payload) {
        if (Array.isArray(payload)) {
            return payload
                .map((item) => {
                    if (typeof item === "string") return item;
                    if (item && typeof item === "object") {
                        return item.name || item.id || item.style || "";
                    }
                    return "";
                })
                .filter(Boolean);
        }

        if (payload && typeof payload === "object") {
            if (Array.isArray(payload.styles)) {
                return payload.styles
                    .map((item) => {
                        if (typeof item === "string") return item;
                        if (item && typeof item === "object") {
                            return item.name || item.id || item.style || "";
                        }
                        return "";
                    })
                    .filter(Boolean);
            }
            if (payload.styles && typeof payload.styles === "object") {
                return Object.keys(payload.styles);
            }
            return Object.keys(payload);
        }

        return [];
    }

    function setStyleOptions(styleNames, selectedStyle) {
        controls.styleName.innerHTML = "";
        styleNames.forEach((name) => {
            const option = document.createElement("option");
            option.value = name;
            option.textContent = name;
            controls.styleName.appendChild(option);
        });

        if (!styleNames.length) return;

        const nextSelection = styleNames.includes(selectedStyle) ? selectedStyle : styleNames[0];
        controls.styleName.value = nextSelection;
        config.styleName = nextSelection;
    }

    async function loadStyleOptions() {
        const previous = controls.styleName.value || config.styleName;
        try {
            const response = await fetch(stylesEndpointUrl(), { cache: "no-store" });
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            const payload = await response.json();
            const styleNames = extractStyleNames(payload);
            if (!styleNames.length) {
                throw new Error("No styles found");
            }
            setStyleOptions(styleNames, previous);
            return true;
        } catch (error) {
            try {
                const legacyResponse = await fetch(normalizeBaseUrl(config.baseUrl) + "/styles.json", { cache: "no-store" });
                if (legacyResponse.ok) {
                    const legacyPayload = await legacyResponse.json();
                    const legacyStyles = extractStyleNames(legacyPayload);
                    if (legacyStyles.length) {
                        setStyleOptions(legacyStyles, previous);
                        setStatus("Loaded style list from legacy style API.", false);
                        return true;
                    }
                }
            } catch (fallbackError) {
                setStyleOptions([config.styleName], config.styleName);
                setStatus("Style list load warning: " + error.message + " | Fallback failed: " + fallbackError.message, true);
                return false;
            }
        }
    }

    controls.baseUrl.value = config.baseUrl;
    setStyleOptions([config.styleName], config.styleName);

    if (typeof maplibregl === "undefined") {
        setStatus("maplibre-gl.js لود نشده است. مسیر ./vendor/maplibre-gl.js را چک کنید.", true);
        controls.applyBtn.disabled = true;
    }

    let map = null;

    function configureRtlPlugin() {
        if (typeof maplibregl.setRTLTextPlugin !== "function") return;

        if (window.location.protocol === "file:") {
            console.warn("RTL plugin skipped on file://. Run this page via http://localhost to enable RTL plugin.help : python3 -m http.server 8088 ");
            return;
        }

        const rtlPluginUrl = new URL("./vendor/mapbox-gl-rtl-text.js", window.location.href).href;
        try {
            maplibregl.setRTLTextPlugin(rtlPluginUrl, (error) => {
                if (error) {
                    setStatus("RTL plugin load warning: " + error.message, true);
                }
            }, true);
        } catch (error) {
            setStatus("RTL plugin load warning: " + error.message, true);
        }
    }

    window.addEventListener("unhandledrejection", (event) => {
        const reason = event && event.reason;
        const message = reason && reason.message ? reason.message : "";
        if (message.includes("RTL Text Plugin failed to import scripts")) {
            event.preventDefault();
            setStatus("RTL plugin load warning: " + message, true);
        }
    });

    async function initMap() {
        if (typeof maplibregl === "undefined") return;

        const canUseWebGL = typeof maplibregl.supported === "function"
            ? maplibregl.supported({ failIfMajorPerformanceCaveat: false })
            : true;

        if (!canUseWebGL) {
            setStatus("WebGL در این مرورگر/سیستم فعال نیست. نقشه قابل نمایش نیست.", true);
            controls.applyBtn.disabled = true;
            return;
        }

        configureRtlPlugin();
        await loadStyleOptions();

        try {
            map = new maplibregl.Map({
                container: "map",
                style: vectorStyleUrl(),
                center: config.center,
                zoom: config.zoom
            });
        } catch (error) {
            setStatus("Failed to initialize WebGL. مرورگر را با WebGL/Hardware Acceleration اجرا کنید.", true);
            controls.applyBtn.disabled = true;
            return;
        }

        map.addControl(new maplibregl.NavigationControl(), "top-left");

        map.on("style.load", () => {
            setStatus("Style loaded: " + vectorStyleUrl(), false);
        });

        map.on("error", (event) => {
            const message = event && event.error && event.error.message ? event.error.message : "Map error";
            setStatus(message, true);
        });
    }

    initMap();

    controls.applyBtn.addEventListener("click", async () => {
        config.baseUrl = controls.baseUrl.value.trim();
        await loadStyleOptions();
        config.styleName = controls.styleName.value.trim();

        if (!config.baseUrl || !config.styleName) {
            setStatus("Base URL و Style name اجباری هستند.", true);
            return;
        }

        if (!map) {
            setStatus("Map ساخته نشده چون WebGL در دسترس نیست.", true);
            return;
        }

        setStatus("Reloading map style...", false);
        map.setStyle(vectorStyleUrl());
    });
</script>
</body>
</html>
